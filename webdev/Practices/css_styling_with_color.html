<!DOCTYPE html>
<html lang="en">
<head>
    <title>Color Theory Boxes</title>
    <meta charset="UTF-8"/>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            font-size: 25px;
            font-family: fantasy;

        }

        .box {
            width: 200px;
            height: 200px;
            font-weight: bold;
            border: 10px inset black;
        }

        /* Complementary: Blue & Orange */
        .complementary {
            background-color: blue;
            border-color: orange;
            color: white;
        }

        /* Analogous: Green, Yellow-Green, Yellow */
        .analogous {
            background-color: green;
            border-color: yellowgreen;
            color: yellow;
        }

        /* Triadic: Red, Blue, Yellow */
        .triadic {
            background-color: red;
            border-color: blue;
            color: yellow;
        }
    </style>
</head>

<body>

    <h1>Color Theory Examples</h1>

    <div class="box complementary">Complementary</div>
    <br>

    <div class="box analogous">Analogous</div>
    <br>

    <div class="box triadic">Triadic</div>

</body>
</html>
